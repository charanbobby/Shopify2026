site_name: Shopify 2026 - Project Phoenix
docs_dir: docs
site_url: https://charanbobby.github.io/Shopify2026/
use_directory_urls: false

theme:
  name: material
  custom_dir: overrides
  palette:
    primary: deep purple
    accent: purple
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.sections
    - navigation.instant
    - navigation.instant.progress
    - search.highlight

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md

  - Project Phoenix:
      - Strategic Migration: project-phoenix.md
      - Requirements Backlog: requirements-backlog.md

  - Decision Framework: decision-framework.md

  - Supporting Docs:
      - Integration Map: integration-map.md
      - Agency Notes: agency-notes.md
      - SEO Risk Assessment: seo-risk-assessment.md
      - Risk Register: risk-register.md
      - Current State Baseline: current-state-baseline.md

  - Architecture:
      - Current S&S Architecture: current-sns-architecture.md
      - Short-Term Strategy: developer-analysis.md

  - FAQ: faq.md

