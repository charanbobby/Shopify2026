[build]
  command = "pip install mkdocs mkdocs-material && mkdocs build"
  publish = "site"

[build.environment]
  PYTHON_VERSION = "3.11"

# HTML pages — always revalidate so updates are seen immediately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# Hashed assets — cache forever (filenames change when content changes)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
